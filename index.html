<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandala Art Creator</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">✿</span>
                    <h1 class="app-title" data-i18n="app.title">Mandala Art Creator</h1>
                </div>
                <div class="header-controls">
                    <div class="language-selector">
                        <select id="lang-switch">
                            <option value="en">English</option>
                            <option value="vi">Tiếng Việt</option>
                        </select>
                    </div>
                </div>
            </div>
        </header>

        <main class="app-main">
            <aside class="sidebar">
                <div class="layer-panel">
                    <h2 class="panel-title" data-i18n="layers.title">Layers</h2>
                    <div class="layer-controls">
                        <button id="add-layer-button" class="icon-button" aria-label="Add Layer" title="Add Layer">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                        </button>
                    </div>
                    <div id="layer-list" class="layer-list"></div>
                </div>

                <div id="properties-panel" class="properties-panel panel">
                    <h2 class="panel-title" id="prop-panel-title" data-i18n="properties.title">Properties</h2>
                    <div class="option-row" id="prop-stroke-row">
                        <label data-i18n="properties.stroke">Stroke</label>
                        <input type="color" id="prop-stroke-color" value="#000000">
                    </div>
                    <div class="option-row" id="prop-fill-row">
                        <label data-i18n="properties.fill">Fill</label>
                        <input type="color" id="prop-fill-color" value="#ffffff">
                    </div>
                    <div class="option-row">
                        <label data-i18n="properties.strokeWidth" id="prop-width-label">Width</label>
                        <input type="range" id="prop-stroke-width" min="0" max="50" value="2">
                        <span class="value">2</span>
                    </div>
                    <div class="option-row" id="prop-opacity-row">
                        <label data-i18n="tools.opacity">Opacity</label>
                        <input type="range" id="prop-opacity" min="0" max="100" value="100">
                        <span class="value">100%</span>
                    </div>
                    <div class="option-row" id="prop-symmetry-row">
                        <label class="checkbox-label">
                            <input type="checkbox" id="prop-apply-symmetry" checked>
                            <span data-i18n="properties.applySymmetry">Apply to Symmetry Group</span>
                        </label>
                    </div>
                </div>
            </aside>

            <div class="canvas-wrapper">
                <canvas id="main-canvas"></canvas>
                <div id="grid-overlay" class="grid-overlay"></div>
                <div id="center-crosshair" class="center-crosshair">
                    <div class="crosshair-h"></div>
                    <div class="crosshair-v"></div>
                </div>
            </div>
        </main>

        <nav class="toolbar">
            <div class="tool-group colors">
                <div class="color-section">
                    <label for="bg-color" data-i18n="canvas.background">BG</label>
                    <input type="color" id="bg-color" value="#ffffff">
                </div>
                <div class="color-section">
                    <label for="draw-color">FG</label>
                    <input type="color" id="draw-color" value="#000000">
                </div>
            </div>

            <div class="tool-group tools">
                <button id="brush-tool-button" class="tool-button active" aria-label="Brush Tool">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 19l7-7 3 3-7 7-3-3z"/>
                        <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
                        <path d="M2 2l7.586 7.586"/>
                    </svg>
                    <span data-i18n="tools.brush">Brush</span>
                </button>

                <div class="separator"></div>

                <div class="shape-buttons">
                    <button class="shape-button" data-shape="line" data-i18n="[title]shapes.line">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/></svg>
                    </button>
                    <button class="shape-button" data-shape="rectangle" data-i18n="[title]shapes.rectangle">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                    </button>
                    <button class="shape-button" data-shape="square" data-i18n="[title]shapes.square">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="5" width="14" height="14" rx="1"/></svg>
                    </button>
                    <button class="shape-button" data-shape="circle" data-i18n="[title]shapes.circle">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>
                    </button>
                    <button class="shape-button" data-shape="ellipse" data-i18n="[title]shapes.ellipse">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="9" ry="5"/></svg>
                    </button>
                    <button class="shape-button" data-shape="triangle" data-i18n="[title]shapes.triangle">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 22h20L12 2z"/></svg>
                    </button>
                    <button class="shape-button" data-shape="diamond" data-i18n="[title]shapes.diamond">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l10 10-10 10-10-10L12 2z"/></svg>
                    </button>
                </div>
            </div>

            <div class="tool-group symmetry">
                <div class="symmetry-control">
                    <label class="symmetry-toggle-label">
                        <input type="checkbox" id="symmetry-toggle">
                        <span>✿</span>
                    </label>
                </div>
                <div id="symmetry-options" class="symmetry-options" style="display: none;">
                    <select id="symmetry-count">
                        <option value="4">4</option>
                        <option value="6">6</option>
                        <option value="8" selected>8</option>
                        <option value="12">12</option>
                        <option value="16">16</option>
                        <option value="24">24</option>
                        <option value="32">32</option>
                    </select>
                </div>
            </div>

            <div class="tool-group actions">
                <button id="undo-button" class="icon-button" aria-label="Undo" title="Undo (Ctrl+Z)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 7v6h6"/>
                        <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
                    </svg>
                </button>
                <button id="redo-button" class="icon-button" aria-label="Redo" title="Redo (Ctrl+Y)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 7v6h-6"/>
                        <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/>
                    </svg>
                </button>
                <button id="delete-button" class="icon-button" aria-label="Delete" title="Delete selected (Del)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
                        <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                </button>
            </div>

            <div class="tool-group grid-control">
                <label for="grid-slider" style="font-size: 12px;">Grid:</label>
                <input type="range" id="grid-slider" min="0" max="80" value="0" style="width: 80px;">
                <span id="grid-value" style="font-size: 12px; min-width: 35px;">Off</span>
                <label for="snap-checkbox" style="font-size: 12px;">Snap</label>
                <input type="checkbox" id="snap-checkbox">
            </div>

            <div class="tool-group export">
                <button id="toggle-center-button" class="icon-button" aria-label="Toggle Center" title="Toggle Center Crosshair">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="16"></line>
                        <line x1="8" y1="12" x2="16" y2="12"></line>
                    </svg>
                </button>
                <button id="zoom-in-button" class="icon-button" aria-label="Zoom In" title="Zoom In (Ctrl++)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        <line x1="11" y1="8" x2="11" y2="14"/>
                        <line x1="8" y1="11" x2="14" y2="11"/>
                    </svg>
                </button>
                <button id="zoom-out-button" class="icon-button" aria-label="Zoom Out" title="Zoom Out (Ctrl+-)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        <line x1="8" y1="11" x2="14" y2="11"/>
                    </svg>
                </button>
                <button id="reset-zoom-button" class="icon-button" aria-label="Reset View" title="Reset View (Ctrl+0)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 3h6v6"/>
                        <path d="M9 21H3v-6"/>
                        <path d="M21 3l-7 7"/>
                        <path d="M3 21l7-7"/>
                    </svg>
                </button>
                <div class="zoom-display">
                    <span id="zoom-level">100%</span>
                </div>
            </div>

            <div class="tool-group share-group">
                <button id="save-button" class="icon-button" aria-label="Save" title="Save Project">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17,8 12,3 7,8"/>
                        <polyline points="12,13 12,3"/>
                    </svg>
                </button>
                <button id="load-button" class="icon-button" aria-label="Load" title="Load Project">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14,2 14,8 20,8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10,9 9,9 8,9"/>
                    </svg>
                </button>
                <button id="reset-button" class="icon-button" aria-label="Reset to Default" title="Reset to Default">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
                        <path d="M21 3v5h-5"/>
                        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
                        <path d="M8 16H3v5"/>
                    </svg>
                </button>
                <button id="export-button" class="icon-button" aria-label="Export" title="Export PNG">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                </button>
                <button id="share-button" class="icon-button" aria-label="Share" title="Share">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="18" cy="5" r="3"/>
                        <circle cx="6" cy="12" r="3"/>
                        <circle cx="18" cy="19" r="3"/>
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                    </svg>
                </button>
                <button id="clear-button" class="icon-button" aria-label="Clear" title="Clear Canvas">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="9" y1="9" x2="15" y2="15"/>
                        <line x1="15" y1="9" x2="9" y2="15"/>
                    </svg>
                </button>
            </div>
        </nav>
    </div>

    <script src="js/events.js"></script>
    <script src="js/symmetry.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/history.js"></script>
    <script src="js/properties.js"></script>
    <script src="js/tools.js"></script>
    <script src="js/shapes.js"></script>
    <script src="js/layers.js"></script>
    <script src="js/palette.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
